version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: transcription-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/transcriptions.db
    restart: unless-stopped
  frontend:
    build:
      context: ./frontend
    container_name: transcription-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
